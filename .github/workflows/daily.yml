name: Daily MSX screen

on:
  schedule:
    # UTC cron — Muscat is UTC+4, no DST. MSX trades Sun–Thu.
    - cron: '0 16 * * 0-4'   # 20:00 (8 PM) Muscat, after the session settles
  workflow_dispatch:
    inputs:
      full:
        description: 'Pull full history (first run)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch EOD data
        run: python msx_fetch.py ${{ inputs.full == true && '--full' || '' }}

      - name: Commit updated data
        run: |
          git config user.name  "msx-edge-bot"
          git config user.email "msx-edge-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "EOD update $(date -u +%F)"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run screener & build site
        run: node screen.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
